name: Deploy Mission Engine

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # Step 1: Download your repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Login to DockerHub
      - name: Login To DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mission-engine:latest .

      # Step 4: Push Docker Image To Registry
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mission-engine:latest

      # Step 5: SSH Into EC2 And Deploy
      - name: Deploy To EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/deployment

            echo "Pulling latest image..."
            docker compose pull

            echo "Restarting containers..."
            docker compose up -d

            echo "Cleaning old unused images..."
            docker image prune -af